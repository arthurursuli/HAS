<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100;200;300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="font-[Sora] min-h-screen flex items-center justify-center">
    <div class="card w-96 bg-base-100 shadow-[0_0_30px_rgba(11,60,129,0.2)] hover:shadow-[0_0_60px_rgba(0,0,0,0.4)] transition-shadow duration-300 grid justify-items-center gap-3 p-5">

        <h2 class="text-black text-xl font-bold">Cadastro</h2>

            <!--<form class="grid gap-3" action="{{ url_for('login') }}" method="post">-->
                <input class="input input-bordered placeholder-black bg-white focus:border-black focus:outline-none hover:border-black" type="text" name="email" placeholder="Email">

                <input class="input input-bordered placeholder-black bg-white focus:border-black focus:outline-none hover:border-black"  type="text" name="usuario" placeholder="Usuário">

                <input class="input input-bordered placeholder-black bg-white focus:border-black focus:outline-none hover:border-black" type="password" name="senha" placeholder="Senha">

                <input class="input input-bordered placeholder-black bg-white focus:border-black focus:outline-none hover:border-black" type="password" name="confirmarsenha" placeholder="Confirmar Senha">

                <button type="submit" class="btn text-white bg-black hover:bg-white hover:text-black hover:border-black"><a href="{{ url_for('login') }}">Cadastrar</a></button>
            <!--</form>-->

            <a href="{{ url_for('login') }}">
            <button class="text-black" type="button">Já possui cadastro</button>
            </a>
    </div>
</body>
</html>
