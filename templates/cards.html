<form method="POST">
    <button type="submit" class="btn text-white bg-black hover:bg-white hover:text-black hover:border-black m-10">
        Mostrar mais
    </button>
</form>
<div class="w-full px-4 mb-10">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

        {% for i in range(quantidade) %}
        <div class="card bg-white shadow-[0_0_30px_rgba(11,60,129,0.2)] hover:shadow-[0_0_60px_rgba(0,0,0,0.4)] transition-shadow duration-300">
            <figure>
                <img src="https://picsum.photos/400/250?random={{ i }}" alt="Imagem do curso"class="w-full h-48 object-cover"/>
            </figure>

            <div class="card-body">
                <h2 class="card-title">
                    Card {{ i + 1 }}
                </h2>

                <p>
                    Descrição ilustrativa do card.
                </p>

                <div class="card-actions justify-end">
                    <button class="btn text-white bg-black hover:bg-white hover:text-black hover:border-black">
                        Ver card
                    </button>
                </div>
            </div>
        </div>
        {% endfor %}

    </div>
</div>
